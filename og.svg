    <ellipse cx="33" cy="24" rx="3" ry="8" fill="#FFD56B" opacity="0.7"/>
    <ellipse cx="67" cy="24" rx="3" ry="8" fill="#FFD56B" opacity="0.7"/>
    <circle cx="50" cy="42" r="22" fill="#FFE9B0" stroke="white" stroke-width="2.5"/>
    <ellipse cx="50" cy="76" rx="24" ry="20" fill="#FFE9B0" stroke="white" stroke-width="2.5"/>
    <ellipse cx="42" cy="78" rx="3" ry="6" fill="#FFCC55" opacity="0.4"/>
