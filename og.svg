    <ellipse cx="33" cy="22" rx="7" ry="13" fill="#FFE4E4" stroke="white" stroke-width="2.5"/>
    <ellipse cx="67" cy="22" rx="7" ry="13" fill="#FFE4E4" stroke="white" stroke-width="2.5"/>
    <ellipse cx="33" cy="24" rx="3" ry="8" fill="#F4A4A4" opacity="0.7"/>
    <ellipse cx="67" cy="24" rx="3" ry="8" fill="#F4A4A4" opacity="0.7"/>
    <circle cx="50" cy="42" r="22" fill="#FFD4D4" stroke="white" stroke-width="2.5"/>
