<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF7EE"/>
      <stop offset="55%" stop-color="#FFE9DA"/>
      <stop offset="100%" stop-color="#FFD4D4"/>
    </linearGradient>
    <radialGradient id="glow-mint" cx="15%" cy="85%" r="35%">
      <stop offset="0%" stop-color="#BFE3D4" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#BFE3D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-lilac" cx="85%" cy="25%" r="30%">
      <stop offset="0%" stop-color="#D7C9E8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#D7C9E8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow-mint)"/>
  <rect width="1200" height="630" fill="url(#glow-lilac)"/>

  <!-- Sakura mark next to wordmark -->
  <g transform="translate(118, 138)">
    <circle cx="0" cy="-22" r="16" fill="#F4A4A4" opacity="0.92"/>
    <circle cx="22" cy="-6" r="16" fill="#F4A4A4" opacity="0.92"/>
    <circle cx="14" cy="19" r="16" fill="#F4A4A4" opacity="0.92"/>
    <circle cx="-14" cy="19" r="16" fill="#F4A4A4" opacity="0.92"/>
    <circle cx="-22" cy="-6" r="16" fill="#F4A4A4" opacity="0.92"/>
    <circle cx="0" cy="0" r="7" fill="#FFCC55"/>
  </g>

  <!-- Wordmark -->
  <text x="180" y="170" font-family="'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', system-ui, sans-serif" font-size="108" font-weight="900" fill="#2A2A33" letter-spacing="-2">doll_trip</text>

  <!-- Tagline -->
  <text x="120" y="265" font-family="'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', system-ui, sans-serif" font-size="54" font-weight="800" fill="#2A2A33">帶娃出門·記錄日常</text>

  <!-- Description -->
  <text x="120" y="332" font-family="'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', system-ui, sans-serif" font-size="28" fill="#6E6E7A" font-weight="500">為台灣 Z 世代設計的 vertical-niche</text>
  <text x="120" y="372" font-family="'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', system-ui, sans-serif" font-size="28" fill="#6E6E7A" font-weight="500">曬娃儀式平台 prototype</text>

  <!-- Schema chips: Character × Location × Moment -->
  <g transform="translate(120, 425)">
    <rect x="0" y="0" width="160" height="50" rx="25" fill="#F4C9C9"/>
    <text x="80" y="33" text-anchor="middle" font-family="'Microsoft JhengHei', 'PingFang TC', system-ui, sans-serif" font-size="24" font-weight="700" fill="#2A2A33">角色</text>

    <text x="178" y="36" font-family="system-ui, sans-serif" font-size="32" font-weight="300" fill="#6E6E7A">×</text>

    <rect x="208" y="0" width="160" height="50" rx="25" fill="#BFE3D4"/>
    <text x="288" y="33" text-anchor="middle" font-family="'Microsoft JhengHei', 'PingFang TC', system-ui, sans-serif" font-size="24" font-weight="700" fill="#2A2A33">地點</text>

    <text x="386" y="36" font-family="system-ui, sans-serif" font-size="32" font-weight="300" fill="#6E6E7A">×</text>

    <rect x="416" y="0" width="160" height="50" rx="25" fill="#D7C9E8"/>
    <text x="496" y="33" text-anchor="middle" font-family="'Microsoft JhengHei', 'PingFang TC', system-ui, sans-serif" font-size="24" font-weight="700" fill="#2A2A33">時刻</text>
  </g>

  <!-- URL -->
  <text x="120" y="568" font-family="'Cascadia Code', 'Consolas', monospace" font-size="22" fill="#2A2A33" font-weight="700">everydayadventuredev.github.io/doll-trip</text>

  <!-- Right side: 3 dolls scattered, different palettes -->

