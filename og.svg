    <ellipse cx="58" cy="78" rx="3" ry="6" fill="#FF9999" opacity="0.4"/>
    <circle cx="42" cy="40" r="3" fill="#2A2A33"/>
    <circle cx="58" cy="40" r="3" fill="#2A2A33"/>
    <circle cx="43" cy="39" r="0.8" fill="white"/>
    <circle cx="59" cy="39" r="0.8" fill="white"/>
    <path d="M 45 48 Q 50 51 55 48" stroke="#2A2A33" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="38" cy="46" r="2.5" fill="#F4A4A4" opacity="0.6"/>
    <circle cx="62" cy="46" r="2.5" fill="#F4A4A4" opacity="0.6"/>
  </g>

  <!-- Doll 3: mint (ren), bottom left of right area -->
  <g transform="translate(750, 410) scale(1.45) rotate(-4 50 50)">
    <ellipse cx="33" cy="22" rx="7" ry="13" fill="#D4F5E2" stroke="white" stroke-width="2.5"/>
    <ellipse cx="67" cy="22" rx="7" ry="13" fill="#D4F5E2" stroke="white" stroke-width="2.5"/>
    <ellipse cx="33" cy="24" rx="3" ry="8" fill="#7AC4A0" opacity="0.7"/>
    <ellipse cx="67" cy="24" rx="3" ry="8" fill="#7AC4A0" opacity="0.7"/>
    <circle cx="50" cy="42" r="22" fill="#BFE3D4" stroke="white" stroke-width="2.5"/>
    <ellipse cx="50" cy="76" rx="24" ry="20" fill="#BFE3D4" stroke="white" stroke-width="2.5"/>
    <ellipse cx="42" cy="78" rx="3" ry="6" fill="#5BAA85" opacity="0.4"/>
    <ellipse cx="58" cy="78" rx="3" ry="6" fill="#5BAA85" opacity="0.4"/>
    <circle cx="42" cy="40" r="3" fill="#2A2A33"/>
    <circle cx="58" cy="40" r="3" fill="#2A2A33"/>
    <circle cx="43" cy="39" r="0.8" fill="white"/>
    <circle cx="59" cy="39" r="0.8" fill="white"/>
    <path d="M 45 48 Q 50 51 55 48" stroke="#2A2A33" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="38" cy="46" r="2.5" fill="#7AC4A0" opacity="0.6"/>
    <circle cx="62" cy="46" r="2.5" fill="#7AC4A0" opacity="0.6"/>
